<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Basecamp</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛺</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Nunito', sans-serif; background: #0f1a0e; color: #fff; }
    .hidden { display: none !important; }

    .bc {
      min-height: 100vh; background: #0f1a0e;
      background-image:
        radial-gradient(ellipse at 10% 60%, rgba(74,147,58,.1) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 10%, rgba(212,160,23,.08) 0%, transparent 45%);
    }

    /* HEADER */
    .bc-header {
      background: rgba(15,26,14,.96); border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 10px 18px; position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 12px;
    }
    .bc-logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; user-select: none; }
    .bc-tent { font-size: 22px; line-height: 1; }
    .bc-wordmark {
      font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: .04em; line-height: 1;
      background: linear-gradient(135deg, #e8a020, #f0c040);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .bc-wordmark span { background: linear-gradient(135deg, #5db84a, #7dd668); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .bc-srow { flex: 1; display: flex; gap: 8px; min-width: 0; }
    .bc-si {
      flex: 1; min-width: 0; background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.09);
      border-radius: 50px; padding: 10px 18px; color: #fff; font-size: 15px;
      font-family: 'Nunito', sans-serif; outline: none; transition: border-color .2s;
    }
    .bc-si:focus { border-color: #e8a020; }
    .bc-si::placeholder { color: rgba(255,255,255,.25); }
    .bc-sb {
      background: linear-gradient(135deg, #e8a020, #d4881a); color: #0f1a0e; border: none;
      border-radius: 50px; padding: 10px 18px; font-size: 14px; font-weight: 800;
      font-family: 'Nunito', sans-serif; cursor: pointer; white-space: nowrap;
    }
    .bc-shuffle {
      background: linear-gradient(135deg, #e8a020, #d4881a); color: #0f1a0e; border: none;
      border-radius: 50px; padding: 10px 16px; font-size: 14px; font-weight: 900;
      font-family: 'Nunito', sans-serif; cursor: pointer; white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 3px 14px rgba(232,160,32,.4);
    }

    /* BODY */
    .bc-body { padding: 22px 18px; max-width: 1200px; margin: 0 auto; }
    .bc-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(93,184,74,.1); border: 1px solid rgba(93,184,74,.2);
      border-radius: 50px; padding: 5px 13px; font-size: 11px; font-weight: 800;
      color: #7dd668; margin-bottom: 20px;
    }
    .bc-dot { width: 7px; height: 7px; border-radius: 50%; background: #7dd668; animation: bcpulse 2s ease-in-out infinite; display: inline-block; }
    @keyframes bcpulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.65)} }
    .bc-h2 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .06em; color: rgba(255,255,255,.5); margin-bottom: 18px; }
    .bc-h2 em { font-style: normal; color: #e8a020; }

    /* GRID */
    .bc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
    .bc-vc {
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px; overflow: hidden; cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s;
    }
    .bc-vc:hover { transform: translateY(-5px); border-color: rgba(232,160,32,.45); box-shadow: 0 10px 36px rgba(232,160,32,.15); }
    .bc-vc:active { transform: translateY(-2px); }
    .bc-th { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #1a2a18; }
    .bc-vi { padding: 11px 13px 13px; }
    .bc-vch { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .07em; color: #7dd668; margin-bottom: 4px; }
    .bc-vt { font-size: 13px; font-weight: 700; color: rgba(255,255,255,.88); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* STATES */
    .bc-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 18px; }
    .bc-spin { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,.08); border-top-color: #e8a020; border-radius: 50%; animation: bcspin .75s linear infinite; }
    @keyframes bcspin { to { transform: rotate(360deg); } }
    .bc-lt { font-size: 16px; font-weight: 700; color: rgba(255,255,255,.4); }
    .bc-empty { text-align: center; padding: 60px 20px; }
    .bc-ei { font-size: 72px; margin-bottom: 16px; animation: bcbob 2.5s ease-in-out infinite; display: block; }
    @keyframes bcbob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .bc-empty-txt { font-size: 22px; font-weight: 900; color: rgba(255,255,255,.55); margin-bottom: 28px; font-family:'Bebas Neue',sans-serif; letter-spacing:.05em; }
    .bc-bigbtn {
      background: linear-gradient(135deg, #e8a020, #c87d10); color: #0f1a0e; border: none;
      border-radius: 50px; padding: 18px 38px; font-size: 20px; font-weight: 900;
      font-family: 'Nunito', sans-serif; cursor: pointer;
      box-shadow: 0 6px 28px rgba(232,160,32,.45); animation: bcpulse2 2s ease-in-out infinite;
    }
    @keyframes bcpulse2 { 0%,100%{box-shadow:0 6px 28px rgba(232,160,32,.45)} 50%{box-shadow:0 6px 40px rgba(232,160,32,.75)} }

    /* PLAYER */
    .bc-ov { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; flex-direction: column; }
    .bc-mh {
      padding: 10px 15px; display: flex; align-items: center; gap: 12px;
      background: rgba(15,26,14,.98); flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .bc-x {
      background: rgba(255,255,255,.08); border: none; color: #fff;
      width: 40px; height: 40px; border-radius: 50%; font-size: 18px;
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    .bc-done {
      margin-left: auto; flex-shrink: 0;
      background: rgba(255,255,255,.08); border: 1.5px solid rgba(255,255,255,.15);
      color: #fff; border-radius: 50px; padding: 8px 16px;
      font-size: 13px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer;
    }
    .bc-mt { font-size: 13px; font-weight: 800; color: #fff; line-height: 1.3; min-width: 0; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .bc-mc { font-size: 10px; color: #7dd668; font-weight: 700; margin-top: 2px; }
    .bc-pl { flex: 1; position: relative; background: #000; }
    .bc-pl iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

    /* END SCREEN */
    .bc-endscreen {
      position: absolute; inset: 0; background: #0f1a0e;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; padding: 30px; text-align: center;
    }
    .bc-end-icon { font-size: 64px; animation: bcbob 2.5s ease-in-out infinite; }
    .bc-end-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: .05em; color: rgba(255,255,255,.7); }
    .bc-end-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .bc-end-next {
      background: linear-gradient(135deg, #e8a020, #c87d10); color: #0f1a0e; border: none;
      border-radius: 50px; padding: 14px 28px; font-size: 17px; font-weight: 900;
      font-family: 'Nunito', sans-serif; cursor: pointer;
    }
    .bc-end-back {
      background: rgba(255,255,255,.08); color: #fff; border: 1.5px solid rgba(255,255,255,.15);
      border-radius: 50px; padding: 14px 28px; font-size: 17px; font-weight: 800;
      font-family: 'Nunito', sans-serif; cursor: pointer;
    }

    @media (max-width: 480px) {
      .bc-logo { display: none; }
      .bc-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    }
  </style>
</head>
<body>

<div class="bc">
  <div class="bc-header">
    <div class="bc-logo">
      <span class="bc-tent">⛺</span>
      <span class="bc-wordmark">Base<span>camp</span></span>
    </div>
    <div class="bc-srow">
      <input class="bc-si" type="search" id="search-input" placeholder="Search anything..." autocomplete="off" />
      <button class="bc-sb" id="search-btn">🔍 Search</button>
    </div>
    <button class="bc-shuffle" id="shuffle-btn">🔀 New Mission</button>
  </div>

  <div class="bc-body">
    <div class="bc-pill"><span class="bc-dot"></span><span id="pill-text">Loading…</span></div>
    <div class="bc-h2" id="feed-label">TODAY'S <em>MISSION</em></div>

    <div id="loading" class="bc-loading">
      <div class="bc-spin"></div>
      <div class="bc-lt">Loading the mission…</div>
    </div>

    <div id="empty" class="bc-empty hidden">
      <span class="bc-ei">⛺</span>
      <div class="bc-empty-txt" id="empty-txt">What are we watching today?</div>
      <button class="bc-bigbtn" id="big-btn">Find me something awesome</button>
    </div>

    <div id="grid" class="bc-grid hidden"></div>
  </div>
</div>

<!-- No player needed - videos open in Invidious tab -->

<script>
  // Piped instances — open source YouTube frontend, more stable than Invidious
  const INVIDIOUS = "https://inv.nadeko.net";
  let allVideos = [];

  const el = id => document.getElementById(id);
  const show = id => el(id).classList.remove("hidden");
  const hide = id => el(id).classList.add("hidden");

  // ── LOAD VIDEO POOL ──────────────────────────────────────────────────────
  async function loadPool() {
    try {
      const r = await fetch("videos.json?_=" + Date.now());
      const data = await r.json();
      allVideos = data.videos || [];
      el("pill-text").textContent = allVideos.length + " videos · Updated daily";
      hide("loading");
      if (allVideos.length === 0) {
        showEmpty("Videos are loading — check back in a few minutes!", false);
      } else {
        showShuffle();
      }
    } catch {
      hide("loading");
      showEmpty("Couldn't load videos. Try refreshing.", false);
    }
  }

  // ── GRID ─────────────────────────────────────────────────────────────────
  function showShuffle() {
    const shuffled = [...allVideos].sort(() => Math.random() - 0.5).slice(0, 30);
    el("feed-label").innerHTML = "TODAY'S <em>MISSION</em>";
    renderGrid(shuffled);
  }

  function renderGrid(videos) {
    const grid = el("grid");
    hide("empty");
    if (!videos.length) {
      showEmpty("Nothing found — try a different search!", true);
      return;
    }
    grid.innerHTML = "";
    videos.forEach(v => {
      const div = document.createElement("div");
      div.className = "bc-vc";
      div.innerHTML = `
        <img class="bc-th" src="${v.thumb}" alt="" loading="lazy" onerror="this.style.display='none'"/>
        <div class="bc-vi">
          <div class="bc-vch">${v.channel}</div>
          <div class="bc-vt">${v.title}</div>
        </div>`;
      div.onclick = () => playVideo(v);
      grid.appendChild(div);
    });
    show("grid");
  }

  function showEmpty(msg, showBackBtn) {
    hide("grid");
    el("empty-txt").textContent = msg;
    el("big-btn").textContent = showBackBtn ? "← Back to mission" : "Find me something awesome";
    el("big-btn").onclick = showBackBtn
      ? () => { el("search-input").value = ""; showShuffle(); }
      : showShuffle;
    show("empty");
  }

  // ── SEARCH (client-side) ─────────────────────────────────────────────────
  function doSearch() {
    const q = el("search-input").value.trim().toLowerCase();
    if (!q) { showShuffle(); return; }
    el("feed-label").innerHTML = `RESULTS FOR <em>"${el("search-input").value.trim()}"</em>`;
    const results = allVideos.filter(v =>
      v.title.toLowerCase().includes(q) || v.channel.toLowerCase().includes(q)
    );
    hide("grid");
    renderGrid(results);
  }

  // ── PLAYER ───────────────────────────────────────────────────────────────
  function playVideo(v) {
    // Open video directly on Invidious — no iframe, no bot detection
    // User watches on Invidious, hits back button to return to Basecamp
    window.open(`${INVIDIOUS}/watch?v=${v.id}`, "_blank");
  }

  // ── EVENTS ───────────────────────────────────────────────────────────────
  el("shuffle-btn").onclick = () => { el("search-input").value = ""; showShuffle(); };
  el("search-btn").onclick = doSearch;
  el("search-input").addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });
  // No player events needed

  // ── INIT ─────────────────────────────────────────────────────────────────
  loadPool();
</script>
</body>
</html>
