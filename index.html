<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Basecamp</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛺</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Nunito', sans-serif; }
    .hidden { display: none !important; }

    body.theme-forest { --bg:#0f1a0e;--bg2:rgba(15,26,14,.96);--accent:#e8a020;--card:rgba(255,255,255,.03);--border:rgba(255,255,255,.06);--text:#fff;--sub:rgba(255,255,255,.5);--pill:rgba(93,184,74,.1);--pill-border:rgba(93,184,74,.2);--pill-txt:#7dd668;--glow1:rgba(74,147,58,.1);--glow2:rgba(212,160,23,.08); }
    body.theme-ocean  { --bg:#0a1628;--bg2:rgba(10,22,40,.96);--accent:#0ea5e9;--card:rgba(255,255,255,.03);--border:rgba(255,255,255,.06);--text:#fff;--sub:rgba(255,255,255,.5);--pill:rgba(14,165,233,.1);--pill-border:rgba(14,165,233,.2);--pill-txt:#38bdf8;--glow1:rgba(14,165,233,.1);--glow2:rgba(56,189,248,.07); }
    body.theme-galaxy { --bg:#0d0a1e;--bg2:rgba(13,10,30,.96);--accent:#a855f7;--card:rgba(255,255,255,.03);--border:rgba(255,255,255,.06);--text:#fff;--sub:rgba(255,255,255,.5);--pill:rgba(168,85,247,.1);--pill-border:rgba(168,85,247,.2);--pill-txt:#e879f9;--glow1:rgba(168,85,247,.1);--glow2:rgba(232,121,249,.07); }
    body.theme-sunset { --bg:#1a0a0a;--bg2:rgba(26,10,10,.96);--accent:#f97316;--card:rgba(255,255,255,.03);--border:rgba(255,255,255,.06);--text:#fff;--sub:rgba(255,255,255,.5);--pill:rgba(249,115,22,.1);--pill-border:rgba(249,115,22,.2);--pill-txt:#fb923c;--glow1:rgba(249,115,22,.1);--glow2:rgba(251,146,60,.07); }
    body.theme-arctic { --bg:#f0f4f8;--bg2:rgba(240,244,248,.97);--accent:#0369a1;--card:rgba(0,0,0,.04);--border:rgba(0,0,0,.08);--text:#0f172a;--sub:rgba(15,23,42,.5);--pill:rgba(3,105,161,.08);--pill-border:rgba(3,105,161,.2);--pill-txt:#0369a1;--glow1:rgba(3,105,161,.06);--glow2:rgba(14,165,233,.05); }

    .bc { min-height:100vh; background:var(--bg); color:var(--text); background-image:radial-gradient(ellipse at 10% 60%,var(--glow1) 0%,transparent 50%),radial-gradient(ellipse at 90% 10%,var(--glow2) 0%,transparent 45%); }

    .bc-header { background:var(--bg2); border-bottom:1px solid var(--border); padding:10px 16px; position:sticky; top:0; z-index:100; display:flex; align-items:center; gap:10px; backdrop-filter:blur(14px); }
    .bc-logo { display:flex; align-items:center; gap:7px; flex-shrink:0; user-select:none; }
    .bc-tent { font-size:20px; }
    .bc-wordmark { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:.04em; background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 70%,white)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .bc-srow { flex:1; display:flex; gap:8px; min-width:0; }
    .bc-si { flex:1; min-width:0; background:var(--card); border:1.5px solid var(--border); border-radius:50px; padding:9px 16px; color:var(--text); font-size:14px; font-family:'Nunito',sans-serif; outline:none; transition:border-color .2s; }
    .bc-si:focus { border-color:var(--accent); }
    .bc-si::placeholder { color:var(--sub); }
    .bc-btn { background:var(--accent); color:#0f1a0e; border:none; border-radius:50px; padding:9px 16px; font-size:13px; font-weight:800; font-family:'Nunito',sans-serif; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .bc-btn:hover { opacity:.85; }
    .bc-btn-ghost { background:var(--card); border:1.5px solid var(--border); color:var(--text); border-radius:50px; padding:9px 12px; font-size:14px; cursor:pointer; flex-shrink:0; font-family:'Nunito',sans-serif; }

    .bc-tabs { display:flex; gap:4px; background:var(--bg2); border-bottom:1px solid var(--border); padding:0 16px; }
    .bc-tab { background:none; border:none; color:var(--sub); font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:.05em; padding:10px 16px; cursor:pointer; border-bottom:3px solid transparent; transition:color .2s,border-color .2s; }
    .bc-tab:hover { color:var(--text); }
    .bc-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

    .bc-themes { display:flex; gap:6px; align-items:center; flex-shrink:0; }
    .bc-theme-dot { width:20px; height:20px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .15s,border-color .15s; }
    .bc-theme-dot:hover { transform:scale(1.2); }
    .bc-theme-dot.active { border-color:var(--text); transform:scale(1.15); }
    .bc-theme-dot.forest { background:linear-gradient(135deg,#0f1a0e,#e8a020); }
    .bc-theme-dot.ocean  { background:linear-gradient(135deg,#0a1628,#0ea5e9); }
    .bc-theme-dot.galaxy { background:linear-gradient(135deg,#0d0a1e,#a855f7); }
    .bc-theme-dot.sunset { background:linear-gradient(135deg,#1a0a0a,#f97316); }
    .bc-theme-dot.arctic { background:linear-gradient(135deg,#e0f2fe,#0369a1); }

    .bc-body { padding:20px 16px; max-width:1200px; margin:0 auto; }
    .bc-pill { display:inline-flex; align-items:center; gap:7px; background:var(--pill); border:1px solid var(--pill-border); border-radius:50px; padding:5px 12px; font-size:11px; font-weight:800; color:var(--pill-txt); margin-bottom:18px; }
    .bc-dot { width:7px; height:7px; border-radius:50%; background:var(--pill-txt); animation:bcpulse 2s ease-in-out infinite; display:inline-block; }
    @keyframes bcpulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.65)} }
    .bc-h2 { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:.06em; color:var(--sub); margin-bottom:16px; }
    .bc-h2 em { font-style:normal; color:var(--accent); }

    /* VIDEO GRID */
    .bc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; }
    .bc-vc { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; cursor:pointer; transition:transform .2s,border-color .2s,box-shadow .2s; }
    .bc-vc:hover { transform:translateY(-4px); border-color:color-mix(in srgb,var(--accent) 60%,transparent); box-shadow:0 8px 28px color-mix(in srgb,var(--accent) 20%,transparent); }
    .bc-th { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:var(--border); }
    .bc-vi { padding:10px 12px 12px; }
    .bc-vch { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:var(--pill-txt); margin-bottom:4px; }
    .bc-vt { font-size:13px; font-weight:700; line-height:1.4; opacity:.88; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

    /* MUSIC GRID */
    .bc-music-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px; }
    .bc-mc { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; cursor:pointer; transition:transform .2s,border-color .2s,box-shadow .2s; }
    .bc-mc:hover { transform:translateY(-5px); border-color:color-mix(in srgb,var(--accent) 70%,transparent); box-shadow:0 10px 32px color-mix(in srgb,var(--accent) 25%,transparent); }
    .bc-mthumb-wrap { position:relative; width:100%; aspect-ratio:1; overflow:hidden; }
    .bc-mthumb { width:100%; height:100%; object-fit:cover; display:block; background:var(--border); }
    .bc-mplay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.35); opacity:0; transition:opacity .2s; }
    .bc-mc:hover .bc-mplay { opacity:1; }
    .bc-mplay-icon { width:48px; height:48px; background:rgba(255,255,255,.9); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; }
    .bc-minfo { padding:10px 12px 12px; }
    .bc-martist { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:var(--pill-txt); margin-bottom:3px; }
    .bc-mtitle { font-size:12px; font-weight:700; line-height:1.3; opacity:.88; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

    /* GAMES */
    .bc-games-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; }
    .bc-game-card { background:var(--card); border:1px solid var(--border); border-radius:18px; overflow:hidden; cursor:pointer; transition:transform .2s,border-color .2s,box-shadow .2s; }
    .bc-game-card:hover { transform:translateY(-5px) scale(1.02); border-color:color-mix(in srgb,var(--accent) 70%,transparent); box-shadow:0 10px 32px color-mix(in srgb,var(--accent) 25%,transparent); }
    .bc-game-icon { width:100%; aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:64px; background:color-mix(in srgb,var(--accent) 10%,transparent); }
    .bc-game-info { padding:12px 14px 14px; }
    .bc-game-title { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:.04em; margin-bottom:4px; }
    .bc-game-desc { font-size:12px; color:var(--sub); line-height:1.4; }
    .bc-game-tag { display:inline-block; margin-top:8px; background:var(--pill); border:1px solid var(--pill-border); border-radius:50px; padding:3px 10px; font-size:10px; font-weight:800; color:var(--pill-txt); }

    /* GAME PLAYER */
    .bc-game-ov { position:fixed; inset:0; z-index:999; background:#000; display:flex; flex-direction:column; }
    .bc-game-bar { background:var(--bg2); border-bottom:1px solid var(--border); padding:10px 14px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .bc-game-close { background:rgba(255,255,255,.08); border:none; color:var(--text); width:38px; height:38px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .bc-game-name { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:.04em; }
    .bc-game-frame { flex:1; border:none; width:100%; }

    /* STATES */
    .bc-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; gap:18px; }
    .bc-spin { width:44px; height:44px; border:4px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:bcspin .75s linear infinite; }
    @keyframes bcspin { to { transform:rotate(360deg); } }
    .bc-lt { font-size:15px; font-weight:700; color:var(--sub); }
    .bc-empty { text-align:center; padding:60px 20px; }
    .bc-ei { font-size:64px; margin-bottom:14px; animation:bcbob 2.5s ease-in-out infinite; display:block; }
    @keyframes bcbob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .bc-empty-txt { font-size:20px; font-weight:900; color:var(--sub); margin-bottom:24px; font-family:'Bebas Neue',sans-serif; letter-spacing:.05em; }
    .bc-bigbtn { background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 80%,black)); color:#0f1a0e; border:none; border-radius:50px; padding:16px 36px; font-size:18px; font-weight:900; font-family:'Nunito',sans-serif; cursor:pointer; }

    .bc-return-banner { position:fixed; bottom:0; left:0; right:0; z-index:998; background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 80%,black)); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .bc-return-txt { font-size:14px; font-weight:800; color:#0f1a0e; min-width:0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .bc-return-btn { background:#0f1a0e; color:var(--accent); border:none; border-radius:50px; padding:9px 18px; font-size:13px; font-weight:900; font-family:'Nunito',sans-serif; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .bc-return-dismiss { background:none; border:none; color:#0f1a0e; font-size:20px; cursor:pointer; opacity:.6; }

    @media (max-width:500px) {
      .bc-logo { display:none; }
      .bc-themes { display:none; }
      .bc-grid,.bc-music-grid,.bc-games-grid { grid-template-columns:repeat(auto-fill,minmax(145px,1fr)); gap:10px; }
    }
  </style>
</head>
<body class="theme-forest">
<div class="bc">
  <div class="bc-header">
    <div class="bc-logo"><span class="bc-tent">⛺</span><span class="bc-wordmark">Basecamp</span></div>
    <div class="bc-srow">
      <input class="bc-si" type="search" id="search-input" placeholder="Search..." autocomplete="off" />
      <button class="bc-btn" id="search-btn">🔍</button>
    </div>
    <button class="bc-btn" id="shuffle-btn">🔀 New Mission</button>
    <div class="bc-themes">
      <div class="bc-theme-dot forest active" data-theme="theme-forest"></div>
      <div class="bc-theme-dot ocean"  data-theme="theme-ocean"></div>
      <div class="bc-theme-dot galaxy" data-theme="theme-galaxy"></div>
      <div class="bc-theme-dot sunset" data-theme="theme-sunset"></div>
      <div class="bc-theme-dot arctic" data-theme="theme-arctic"></div>
    </div>
    <button class="bc-btn-ghost" id="reset-btn">⚙️</button>
  </div>

  <div class="bc-tabs">
    <button class="bc-tab active" id="tab-videos">📺 Videos</button>
    <button class="bc-tab" id="tab-music">🎵 Music</button>
    <button class="bc-tab" id="tab-games">🎮 Games</button>
  </div>

  <div id="panel-videos" class="bc-body">
    <div class="bc-pill"><span class="bc-dot"></span><span id="pill-text">Loading…</span></div>
    <div class="bc-h2" id="feed-label">TODAY'S <em>MISSION</em></div>
    <div id="loading" class="bc-loading"><div class="bc-spin"></div><div class="bc-lt">Loading…</div></div>
    <div id="empty" class="bc-empty hidden">
      <span class="bc-ei">⛺</span>
      <div class="bc-empty-txt" id="empty-txt">What are we watching?</div>
      <button class="bc-bigbtn" id="big-btn">Find me something awesome</button>
    </div>
    <div id="grid" class="bc-grid hidden"></div>
  </div>

  <div id="panel-music" class="bc-body hidden">
    <div class="bc-pill"><span class="bc-dot"></span><span id="music-pill">Music Videos</span></div>
    <div class="bc-h2">🎵 <em>MUSIC VIDEOS</em></div>
    <div id="music-empty" class="bc-empty hidden">
      <span class="bc-ei">🎵</span>
      <div class="bc-empty-txt">No music videos yet — run the workflow!</div>
    </div>
    <div id="music-grid" class="bc-music-grid"></div>
  </div>

  <div id="panel-games" class="bc-body hidden">
    <div class="bc-pill"><span class="bc-dot"></span><span id="games-pill">Game Zone</span></div>
    <div class="bc-h2">MISSION: <em>PLAY</em></div>
    <div id="games-grid" class="bc-games-grid"></div>
  </div>
</div>

<div id="return-banner" class="bc-return-banner hidden">
  <div class="bc-return-txt" id="return-txt">Welcome back!</div>
  <button class="bc-return-btn" id="return-shuffle">🔀 Find something new</button>
  <button class="bc-return-dismiss" id="return-dismiss">✕</button>
</div>

<div id="game-player" class="bc-game-ov hidden">
  <div class="bc-game-bar">
    <button class="bc-game-close" id="close-game">✕</button>
    <div class="bc-game-name" id="game-player-title"></div>
  </div>
  <iframe class="bc-game-frame" id="game-frame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
</div>

<script>
  const INVIDIOUS = "https://inv.nadeko.net";
  const THEME_KEY = "bc_theme";
  const TAB_KEY   = "bc_tab";
  let allVideos = [], allMusic = [];

  const el   = id => document.getElementById(id);
  const show = id => el(id).classList.remove("hidden");
  const hide = id => el(id).classList.add("hidden");

  // THEME
  function setTheme(t) {
    document.body.className = t;
    localStorage.setItem(THEME_KEY, t);
    document.querySelectorAll(".bc-theme-dot").forEach(d => d.classList.toggle("active", d.dataset.theme === t));
  }
  setTheme(localStorage.getItem(THEME_KEY) || "theme-forest");
  document.querySelectorAll(".bc-theme-dot").forEach(d => d.addEventListener("click", () => setTheme(d.dataset.theme)));

  // TABS
  function switchTab(tab) {
    localStorage.setItem(TAB_KEY, tab);
    ["videos","music","games"].forEach(t => {
      el("tab-"+t).classList.toggle("active", t===tab);
      el("panel-"+t).classList.toggle("hidden", t!==tab);
    });
    el("shuffle-btn").classList.toggle("hidden", tab!=="videos");
    if (tab==="music") renderMusic();
    if (tab==="games") loadGames();
  }
  el("tab-videos").addEventListener("click", () => switchTab("videos"));
  el("tab-music").addEventListener("click",  () => switchTab("music"));
  el("tab-games").addEventListener("click",  () => switchTab("games"));

  // LOAD DATA
  async function loadPool() {
    show("loading"); hide("empty"); hide("grid");
    try {
      const r = await fetch("videos.json?_=" + Date.now());
      const data = await r.json();
      const all = data.videos || [];
      allVideos = all.filter(v => !v.music);
      allMusic  = all.filter(v =>  v.music);
      el("pill-text").textContent = allVideos.length + " videos · Updated daily";
      el("music-pill").textContent = allMusic.length + " music videos";
      hide("loading");
      allVideos.length ? showShuffle() : showEmpty("Videos loading — check back soon!", false);
    } catch {
      hide("loading");
      showEmpty("Couldn't load. Try refreshing.", false);
    }
  }

  // VIDEOS
  function showShuffle() {
    const s = [...allVideos].sort(() => Math.random() - 0.5).slice(0, 30);
    el("feed-label").innerHTML = "TODAY'S <em>MISSION</em>";
    renderGrid(s);
  }

  function renderGrid(videos) {
    hide("empty");
    const g = el("grid");
    if (!videos.length) { showEmpty("Nothing found!", true); return; }
    g.innerHTML = "";
    videos.forEach(v => {
      const d = document.createElement("div");
      d.className = "bc-vc";
      d.innerHTML = `<img class="bc-th" src="${v.thumb}" alt="" loading="lazy" onerror="this.style.display='none'"/>
        <div class="bc-vi"><div class="bc-vch">${v.channel}</div><div class="bc-vt">${v.title}</div></div>`;
      d.addEventListener("click", () => play(v));
      g.appendChild(d);
    });
    show("grid");
  }

  function showEmpty(msg, back) {
    hide("grid");
    el("empty-txt").textContent = msg;
    const b = el("big-btn");
    b.textContent = back ? "← Back" : "Find me something awesome";
    b.onclick = back ? () => { el("search-input").value=""; showShuffle(); } : showShuffle;
    show("empty");
  }

  function doSearch() {
    const q = el("search-input").value.trim().toLowerCase();
    const currentTab = localStorage.getItem(TAB_KEY) || "videos";
    if (currentTab === "videos") {
      if (!q) { showShuffle(); return; }
      el("feed-label").innerHTML = `RESULTS FOR <em>"${el("search-input").value.trim()}"</em>`;
      renderGrid(allVideos.filter(v => v.title.toLowerCase().includes(q) || v.channel.toLowerCase().includes(q)));
    } else if (currentTab === "music") {
      const results = q ? allMusic.filter(v => v.title.toLowerCase().includes(q) || v.channel.toLowerCase().includes(q)) : allMusic;
      renderMusicGrid(results);
    } else if (currentTab === "games") {
      searchGames(q);
    }
  }

  function play(v) {
    sessionStorage.setItem("bc_return","1");
    sessionStorage.setItem("bc_vid_title", v.title);
    window.location.href = `${INVIDIOUS}/watch?v=${v.id}`;
  }

  // MUSIC
  function renderMusic() {
    const shuffled = [...allMusic].sort(() => Math.random() - 0.5);
    renderMusicGrid(shuffled);
  }

  function renderMusicGrid(videos) {
    const g = el("music-grid");
    if (!videos.length) { show("music-empty"); g.innerHTML=""; return; }
    hide("music-empty");
    g.innerHTML = "";
    videos.forEach(v => {
      const d = document.createElement("div");
      d.className = "bc-mc";
      d.innerHTML = `
        <div class="bc-mthumb-wrap">
          <img class="bc-mthumb" src="${v.thumb}" alt="" loading="lazy" onerror="this.style.display='none'"/>
          <div class="bc-mplay"><div class="bc-mplay-icon">▶</div></div>
        </div>
        <div class="bc-minfo">
          <div class="bc-martist">${v.channel}</div>
          <div class="bc-mtitle">${v.title}</div>
        </div>`;
      d.addEventListener("click", () => play(v));
      g.appendChild(d);
    });
  }

  // GAMES
  let allGames = [];

  function searchGames(q) {
    const g = el("games-grid");
    if (!q) { renderGamesGrid(allGames); return; }
    renderGamesGrid(allGames.filter(game => game.title.toLowerCase().includes(q) || (game.desc||"").toLowerCase().includes(q) || (game.tag||"").toLowerCase().includes(q)));
  }

  function renderGamesGrid(games) {
    const g = el("games-grid");
    g.innerHTML = "";
    if (!games.length) {
      g.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--sub)"><div style="font-size:48px;margin-bottom:12px">🎮</div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px">No games found</div></div>`;
      return;
    }
    games.forEach(game => {
      const d = document.createElement("div");
      d.className = "bc-game-card";
      d.innerHTML = `
        <div class="bc-game-icon">${game.icon||"🎮"}</div>
        <div class="bc-game-info">
          <div class="bc-game-title">${game.title}</div>
          <div class="bc-game-desc">${game.desc||""}</div>
          <span class="bc-game-tag">${game.tag||"Game"}</span>
        </div>`;
      d.addEventListener("click", () => {
        el("game-player-title").textContent = game.title;
        el("game-frame").src = `games/${game.file}`;
        show("game-player");
      });
      g.appendChild(d);
    });
  }

  async function loadGames() {
    const g = el("games-grid");
    g.innerHTML = "";
    try {
      const r = await fetch("games/games-list.json?_=" + Date.now());
      if (!r.ok) throw new Error();
      const games = await r.json();
      el("games-pill").textContent = games.length + " games";
      allGames = games;
      renderGamesGrid(games);
    } catch {
      g.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--sub)"><div style="font-size:48px;margin-bottom:12px">🎮</div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px">No games yet</div></div>`;
    }
  }

  el("close-game").addEventListener("click", () => { hide("game-player"); el("game-frame").src=""; });

  // RETURN BANNER
  function checkReturn() {
    if (sessionStorage.getItem("bc_return")) {
      sessionStorage.removeItem("bc_return");
      const t = sessionStorage.getItem("bc_vid_title")||"";
      sessionStorage.removeItem("bc_vid_title");
      el("return-txt").textContent = t ? `Done watching "${t.slice(0,50)}"` : "Welcome back!";
      show("return-banner");
    }
  }
  el("return-shuffle").addEventListener("click", () => { hide("return-banner"); el("search-input").value=""; showShuffle(); });
  el("return-dismiss").addEventListener("click", () => hide("return-banner"));
  el("shuffle-btn").addEventListener("click", () => { el("search-input").value=""; showShuffle(); });

  // Update placeholder when tab changes
  const tabPlaceholders = { videos: "Search videos...", music: "Search music...", games: "Search games..." };
  ["videos","music","games"].forEach(t => {
    el("tab-"+t).addEventListener("click", () => {
      el("search-input").value = "";
      el("search-input").placeholder = tabPlaceholders[t] || "Search...";
    });
  });
  el("search-btn").addEventListener("click", doSearch);
  el("search-input").addEventListener("keydown", e => { if(e.key==="Enter") doSearch(); });
  el("reset-btn").addEventListener("click", () => { localStorage.clear(); sessionStorage.clear(); location.reload(); });

  window.addEventListener("pageshow", checkReturn);
  switchTab(localStorage.getItem(TAB_KEY) || "videos");
  loadPool();
</script>
</body>
</html>
