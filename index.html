<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Basecamp</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛺</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Nunito', sans-serif; background: #0f1a0e; }

    .bc {
      min-height: 100vh; background: #0f1a0e; color: #fff;
      font-family: 'Nunito', sans-serif;
      background-image:
        radial-gradient(ellipse at 10% 60%, rgba(74,147,58,.1) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 10%, rgba(212,160,23,.08) 0%, transparent 45%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .bc-setup {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
      background: #0f1a0e;
      background-image:
        radial-gradient(ellipse at 30% 40%, rgba(74,147,58,.13) 0%, transparent 60%),
        radial-gradient(ellipse at 75% 70%, rgba(212,160,23,.09) 0%, transparent 50%);
    }
    .bc-card {
      background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08);
      border-radius: 24px; padding: 44px 40px; max-width: 460px; width: 100%;
      backdrop-filter: blur(12px);
    }
    .bc-icon { font-size: 52px; text-align: center; margin-bottom: 6px; }
    .bc-brand {
      font-family: 'Bebas Neue', sans-serif; font-size: 44px; letter-spacing: .05em;
      text-align: center; margin-bottom: 6px;
      background: linear-gradient(135deg, #e8a020, #f0c040);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .bc-brand span {
      background: linear-gradient(135deg, #5db84a, #7dd668);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .bc-tagline { font-size: 14px; text-align: center; color: rgba(255,255,255,.5); margin-bottom: 32px; line-height: 1.6; }
    .bc-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .07em; color: rgba(255,255,255,.55); margin-bottom: 8px; }
    .bc-field {
      width: 100%; background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 12px; padding: 13px 16px; color: #fff; font-size: 15px;
      font-family: 'Nunito', sans-serif; outline: none; transition: border-color .2s; margin-bottom: 16px;
    }
    .bc-field:focus { border-color: #e8a020; }
    .bc-field::placeholder { color: rgba(255,255,255,.22); }
    .bc-go {
      width: 100%; background: linear-gradient(135deg, #e8a020, #c87d10); color: #0f1a0e;
      border: none; border-radius: 12px; padding: 15px; font-size: 17px; font-weight: 800;
      font-family: 'Nunito', sans-serif; cursor: pointer;
      transition: transform .15s, box-shadow .15s; box-shadow: 0 4px 20px rgba(232,160,32,.3);
    }
    .bc-go:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(232,160,32,.4); }
    .bc-go:active { transform: translateY(0); }
    .bc-hint { margin-top: 16px; font-size: 12px; color: rgba(255,255,255,.3); text-align: center; line-height: 1.8; }
    .bc-hint a { color: #7dd668; text-decoration: none; }
    .bc-hint a:hover { text-decoration: underline; }

    .bc-header {
      background: rgba(15,26,14,.96); border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 10px 18px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(14px);
      display: flex; align-items: center; gap: 14px;
    }
    .bc-logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; user-select: none; }
    .bc-tent { font-size: 22px; line-height: 1; }
    .bc-wordmark {
      font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: .04em; line-height: 1;
      background: linear-gradient(135deg, #e8a020, #f0c040);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .bc-wordmark span {
      background: linear-gradient(135deg, #5db84a, #7dd668);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .bc-srow { flex: 1; display: flex; gap: 8px; min-width: 0; }
    .bc-si {
      flex: 1; min-width: 0; background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.09);
      border-radius: 50px; padding: 10px 18px; color: #fff; font-size: 15px;
      font-family: 'Nunito', sans-serif; outline: none; transition: border-color .2s;
    }
    .bc-si:focus { border-color: #e8a020; }
    .bc-si::placeholder { color: rgba(255,255,255,.25); }
    .bc-sb {
      background: linear-gradient(135deg, #e8a020, #d4881a); color: #0f1a0e; border: none;
      border-radius: 50px; padding: 10px 18px; font-size: 14px; font-weight: 800;
      font-family: 'Nunito', sans-serif; cursor: pointer; white-space: nowrap; transition: opacity .15s;
    }
    .bc-sb:hover { opacity: .88; }
    .bc-rb {
      background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.09); color: #fff;
      border-radius: 50px; padding: 10px 13px; font-size: 16px; cursor: pointer; flex-shrink: 0; transition: background .15s;
    }
    .bc-rb:hover { background: rgba(255,255,255,.14); }
    .bc-shuffle {
      background: linear-gradient(135deg, #e8a020, #d4881a);
      color: #0f1a0e; border: none; border-radius: 50px;
      padding: 10px 16px; font-size: 15px; font-weight: 900;
      font-family: 'Nunito', sans-serif; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 3px 14px rgba(232,160,32,.4);
      transition: transform .15s, box-shadow .15s;
    }
    .bc-shuffle:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(232,160,32,.55); }
    .bc-shuffle:active { transform: translateY(0); }

    .bc-body { padding: 22px 18px; max-width: 1200px; margin: 0 auto; }
    .bc-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(93,184,74,.1); border: 1px solid rgba(93,184,74,.2);
      border-radius: 50px; padding: 5px 13px; font-size: 11px; font-weight: 800;
      color: #7dd668; margin-bottom: 20px; letter-spacing: .03em;
    }
    .bc-dot { width: 7px; height: 7px; border-radius: 50%; background: #7dd668; animation: bcpulse 2s ease-in-out infinite; }
    @keyframes bcpulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.3; transform:scale(.65); } }
    .bc-h2 {
      font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .06em;
      color: rgba(255,255,255,.5); margin-bottom: 18px;
    }
    .bc-h2 em { font-style: normal; color: #e8a020; }

    .bc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
    .bc-vc {
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px; overflow: hidden; cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s;
    }
    .bc-vc:hover { transform: translateY(-5px); border-color: rgba(232,160,32,.45); box-shadow: 0 10px 36px rgba(232,160,32,.15); }
    .bc-vc:active { transform: translateY(-2px); }
    .bc-th { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #1a2a18; }
    .bc-vi { padding: 11px 13px 13px; }
    .bc-vch { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .07em; color: #7dd668; margin-bottom: 4px; }
    .bc-vt { font-size: 13px; font-weight: 700; color: rgba(255,255,255,.88); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .bc-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 18px; }
    .bc-spin { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,.08); border-top-color: #e8a020; border-radius: 50%; animation: bcspin .75s linear infinite; }
    @keyframes bcspin { to { transform: rotate(360deg); } }
    .bc-lt { font-size: 16px; font-weight: 700; color: rgba(255,255,255,.4); }
    .bc-err { background: rgba(255,80,80,.08); border: 1px solid rgba(255,80,80,.25); border-radius: 12px; padding: 14px 16px; color: #ff9090; font-size: 14px; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
    .bc-empty { text-align: center; padding: 60px 20px; }
    .bc-ei { font-size: 72px; margin-bottom: 16px; animation: bcbob 2.5s ease-in-out infinite; }
    @keyframes bcbob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .bc-empty-txt { font-size: 22px; font-weight: 900; color: rgba(255,255,255,.55); margin-bottom: 28px; font-family:'Bebas Neue',sans-serif; letter-spacing:.05em; }
    .bc-bigbtn {
      display: inline-block;
      background: linear-gradient(135deg, #e8a020, #c87d10);
      color: #0f1a0e; border: none; border-radius: 50px;
      padding: 18px 38px; font-size: 20px; font-weight: 900;
      font-family: 'Nunito', sans-serif; cursor: pointer;
      box-shadow: 0 6px 28px rgba(232,160,32,.45);
      transition: transform .2s, box-shadow .2s;
      animation: bcpulse2 2s ease-in-out infinite;
    }
    .bc-bigbtn:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 10px 36px rgba(232,160,32,.6); }
    .bc-bigbtn:active { transform: scale(.97); }
    @keyframes bcpulse2 { 0%,100%{box-shadow:0 6px 28px rgba(232,160,32,.45)} 50%{box-shadow:0 6px 40px rgba(232,160,32,.75)} }

    .bc-ov { position: fixed; inset: 0; background: rgba(0,0,0,.96); z-index: 999; display: flex; flex-direction: column; }
    .bc-mh { padding: 13px 15px; display: flex; align-items: flex-start; gap: 12px; background: rgba(15,26,14,.95); flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,.06); }
    .bc-x { background: rgba(255,255,255,.08); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .bc-x:hover { background: rgba(255,255,255,.18); }
    .bc-mt { font-size: 14px; font-weight: 800; color: #fff; line-height: 1.3; }
    .bc-mc { font-size: 11px; color: #7dd668; font-weight: 700; margin-top: 3px; }
    .bc-pl { flex: 1; position: relative; background: #000; }
    .bc-pl iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .bc-block-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 38%; z-index: 10;
      background: transparent;
      cursor: default;
    }
    .bc-block-overlay-top {
      position: absolute; top: 0; left: 0; right: 0;
      height: 8%; z-index: 10;
      background: transparent;
      cursor: default;
    }
    .bc-endscreen {
      position: absolute; inset: 0; background: #0f1a0e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      padding: 30px; text-align: center;
    }
    .bc-end-icon { font-size: 64px; animation: bcbob 2.5s ease-in-out infinite; }
    .bc-end-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: .05em; color: rgba(255,255,255,.7); }
    .bc-end-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .bc-end-next {
      background: linear-gradient(135deg, #e8a020, #c87d10); color: #0f1a0e;
      border: none; border-radius: 50px; padding: 14px 28px;
      font-size: 17px; font-weight: 900; font-family: 'Nunito', sans-serif;
      cursor: pointer; box-shadow: 0 4px 20px rgba(232,160,32,.4);
      transition: transform .15s, box-shadow .15s;
    }
    .bc-end-next:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(232,160,32,.55); }
    .bc-end-back {
      background: rgba(255,255,255,.08); color: #fff;
      border: 1.5px solid rgba(255,255,255,.15); border-radius: 50px;
      padding: 14px 28px; font-size: 17px; font-weight: 800;
      font-family: 'Nunito', sans-serif; cursor: pointer;
      transition: background .15s;
    }
    .bc-end-back:hover { background: rgba(255,255,255,.15); }

    @media (max-width: 480px) {
      .bc-card { padding: 32px 22px; }
      .bc-logo { display: none; }
      .bc-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useCallback } = React;
    // ── ADD OR REMOVE CHANNELS HERE ─────────────────────────────────────────
    // Use the YouTube handle (the @name from the channel URL). Easy to update.
    const CHANNEL_HANDLES = [
      "kurzgesagt",         // Kurzgesagt
      "TEDed",              // TED-Ed
      "MarkRober",          // Mark Rober
      "SmarterEveryDay",    // SmarterEveryDay
      "veritasium",         // Veritasium
      "theodd1sout",        // TheOdd1sOut
      "SciShowKids",        // SciShow Kids
      "vsauce",             // Vsauce
      "minutephysics",      // MinutePhysics
      "MinuteEarth",        // MinuteEarth
      "CrashCourseKids",    // Crash Course Kids
      "TomScottGo",         // Tom Scott
      "SesameStreet",       // Sesame Street
      "LEGO",               // LEGO
      "NatGeoKids",         // National Geographic Kids
      "ArtforKidsHub",      // Art for Kids Hub
      "HorribleHistories",  // Horrible Histories
      "CosmicKidsYoga",     // Cosmic Kids Yoga
      "Numberblocks",       // Numberblocks
      "WildKratts",                 // Wild Kratts
      "BedtimeHistory",             // Bedtime History - calm story-style history
      "SeeUinHistory",              // See U in History - animated history
      "MrDeMaio",                   // Mr. DeMaio - fun history for kids
      "OverlySarcasticProductions", // Overly Sarcastic Productions - older kids
      "SimplyCivic",                // Simply Civic - history & civics
    ];

    const STORAGE_KEY = "bc_api_key";
    const ID_CACHE_KEY = "bc_channel_ids";

    async function resolveHandle(handle, apiKey) {
      try {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${handle}&key=${apiKey}`);
        if (!res.ok) return null;
        const data = await res.json();
        return data.items?.[0]?.id || null;
      } catch { return null; }
    }

    async function getChannelIds(apiKey) {
      const cached = localStorage.getItem(ID_CACHE_KEY);
      if (cached) { try { return JSON.parse(cached); } catch {} }
      const results = await Promise.allSettled(CHANNEL_HANDLES.map(h => resolveHandle(h, apiKey)));
      const ids = results.map(r => r.status === "fulfilled" ? r.value : null).filter(Boolean);
      if (ids.length > 0) localStorage.setItem(ID_CACHE_KEY, JSON.stringify(ids));
      return ids;
    }

    function isShort(item) {
      const title = (item.snippet?.title || "").toLowerCase();
      const desc = (item.snippet?.description || "").toLowerCase();
      return title.includes("#shorts") || title.includes("#short") || desc.includes("#shorts");
    }

    async function fetchChannelVideos(channelId, apiKey) {
      try {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=10&order=date&type=video&safeSearch=strict&videoDuration=medium&key=${apiKey}`);
        if (!res.ok) return [];
        const data = await res.json();
        return (data.items || []).filter(v => v.id?.videoId && !isShort(v));
      } catch { return []; }
    }

    async function searchYouTube(query, apiKey) {
      try {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)} -shorts&maxResults=20&type=video&safeSearch=strict&videoDuration=medium&key=${apiKey}&relevanceLanguage=en`);
        if (!res.ok) return [];
        const data = await res.json();
        return (data.items || []).filter(v => v.id?.videoId && !isShort(v));
      } catch { return []; }
    }

    async function filterWithClaude(videos) {
      if (!videos.length) return [];
      const list = videos.map((v, i) => ({ i, title: v.snippet?.title || "", desc: (v.snippet?.description || "").slice(0, 150), channel: v.snippet?.channelTitle || "" }));
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514", max_tokens: 1000,
            messages: [{ role: "user", content: `Filter YouTube videos for kids aged 7-9. Be reasonably permissive.\nAPPROVE: science, nature, math, history, humor, animation, crafts, animals, space, experiments, funny skits\nREJECT: scary/horror, real violence, crude sexual humor, political drama, toy hauls, dangerous challenges, rage content\nVideos:\n${JSON.stringify(list)}\nReply ONLY with JSON array like: [{"i":0,"ok":true}]. No other text.` }],
          }),
        });
        const data = await res.json();
        const text = data.content?.[0]?.text || "[]";
        const results = JSON.parse(text.replace(/```json|```/g, "").trim());
        const ok = new Set(results.filter(r => r.ok !== false).map(r => r.i));
        return videos.filter((_, i) => ok.has(i));
      } catch { return videos; }
    }

    function Setup({ onReady }) {
      const [key, setKey] = React.useState("");
      const [saved, setSaved] = React.useState(false);
      const go = () => { const k = key.trim(); if (k.length > 10) { localStorage.setItem(STORAGE_KEY, k); setSaved(true); setTimeout(() => onReady(k), 500); } };
      return (
        <div className="bc-setup">
          <div className="bc-card">
            <div className="bc-icon">⛺</div>
            <div className="bc-brand">Base<span>camp</span></div>
            <p className="bc-tagline">Your mission. Your next obsession.<br />20 channels. Infinite rabbit holes.</p>
            <div className="bc-lbl">YouTube Data API Key</div>
            <input className="bc-field" type="password" placeholder="AIzaSy..." value={key} onChange={e => setKey(e.target.value)} onKeyDown={e => e.key === "Enter" && go()} />
            <button className="bc-go" onClick={go}>{saved ? "✓ Saved! Loading…" : "Enter Basecamp →"}</button>
            <p className="bc-hint">Free key at <a href="https://console.cloud.google.com" target="_blank" rel="noreferrer">console.cloud.google.com</a><br />Enable <strong style={{color:"rgba(255,255,255,.5)"}}>YouTube Data API v3</strong> → Credentials → API Key<br />Key saved locally on this device only.</p>
          </div>
        </div>
      );
    }

    function VCard({ v, onPlay }) {
      const thumb = v.snippet?.thumbnails?.medium?.url || v.snippet?.thumbnails?.default?.url;
      return (
        <div className="bc-vc" onClick={() => onPlay(v)}>
          {thumb && <img className="bc-th" src={thumb} alt="" loading="lazy" />}
          <div className="bc-vi">
            <div className="bc-vch">{v.snippet?.channelTitle}</div>
            <div className="bc-vt">{v.snippet?.title}</div>
          </div>
        </div>
      );
    }

    // Listen for postMessage from YouTube iframe to detect video end
    function Player({ video, onClose, onNext, onBackToFeed }) {
      const [ended, setEnded] = React.useState(false);
      const iframeRef = React.useRef(null);
      const timerRef = React.useRef(null);
      const videoId = video.id.videoId;
      const title = video.snippet?.title;
      const channel = video.snippet?.channelTitle;

      React.useEffect(() => {
        setEnded(false);

        // Method 1: postMessage from YouTube IFrame API
        const onMessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            // YT sends playerState -1=unstarted,0=ended,1=playing,2=paused,3=buffering,5=cued
            if (data.event === "onStateChange" && data.info === 0) {
              setEnded(true);
            }
          } catch {}
        };
        window.addEventListener("message", onMessage);

        // Method 2: fallback — poll video duration from snippet if available
        // Method 3: hard fallback — if 4 hours pass, show end screen (safety net only)
        return () => {
          window.removeEventListener("message", onMessage);
          if (timerRef.current) clearTimeout(timerRef.current);
        };
      }, [video]);

      if (ended) {
        return (
          <div className="bc-ov">
            <div className="bc-mh">
              <button className="bc-x" onClick={onClose}>✕</button>
              <div>
                <div className="bc-mt">{title}</div>
                <div className="bc-mc">{channel}</div>
              </div>
            </div>
            <div className="bc-pl">
              <div className="bc-endscreen">
                <div className="bc-end-icon">⛺</div>
                <div className="bc-end-title">What's next, explorer?</div>
                <div className="bc-end-actions">
                  <button className="bc-end-next" onClick={() => { onNext(); onClose(); }}>
                    🔀 Find something new
                  </button>
                  <button className="bc-end-back" onClick={onBackToFeed}>
                    ← Back to base
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="bc-ov">
          <div className="bc-mh">
            <button className="bc-x" onClick={onClose}>✕</button>
            <div>
              <div className="bc-mt">{title}</div>
              <div className="bc-mc">{channel}</div>
            </div>
          </div>
          <div className="bc-pl">
            <iframe
              ref={iframeRef}
              src={`https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&playsinline=1&enablejsapi=1&origin=${encodeURIComponent(window.location.origin)}`}
              allow="autoplay; encrypted-media; fullscreen"
              allowFullScreen
            />
          </div>
        </div>
      );
    }

    function App() {
      const saved = localStorage.getItem(STORAGE_KEY);
      const [apiKey, setApiKey] = React.useState(saved || "");
      const [ready, setReady] = React.useState(!!saved);
      const [videos, setVideos] = React.useState([]);
      const [loading, setLoading] = React.useState(false);
      const [error, setError] = React.useState("");
      const [searchInput, setSearchInput] = React.useState("");
      const [searchLabel, setSearchLabel] = React.useState("");
      const [playing, setPlaying] = React.useState(null);

      const loadFeed = React.useCallback(async (key) => {
        setLoading(true); setError(""); setSearchLabel(""); setSearchInput("");
        try {
          const allIds = await getChannelIds(key);
          if (allIds.length === 0) { setError("Could not load channels. Check your API key."); setLoading(false); return; }
          const shuffled = [...allIds].sort(() => Math.random() - 0.5).slice(0, 6);
          const batches = await Promise.allSettled(shuffled.map(id => fetchChannelVideos(id, key)));
          const all = batches.filter(r => r.status === "fulfilled").flatMap(r => r.value);
          if (all.length === 0) { setError("No videos loaded. Check your API key and make sure YouTube Data API v3 is enabled."); setLoading(false); return; }
          const filtered = await filterWithClaude(all);
          setVideos(filtered.sort(() => Math.random() - 0.5));
        } catch { setError("Something went wrong. Try refreshing."); }
        setLoading(false);
      }, []);

      const handleReady = React.useCallback((key) => { setApiKey(key); setReady(true); loadFeed(key); }, [loadFeed]);

      const handleSearch = React.useCallback(async () => {
        const q = searchInput.trim(); if (!q) return;
        setLoading(true); setError(""); setSearchLabel(q);
        try {
          const results = await searchYouTube(q, apiKey);
          const filtered = await filterWithClaude(results);
          setVideos(filtered);
        } catch { setError("Search failed. Try again."); }
        setLoading(false);
      }, [searchInput, apiKey]);

      if (!ready) return <Setup onReady={handleReady} />;

      return (
        <div className="bc">
          <div className="bc-header">
            <div className="bc-logo"><span className="bc-tent">⛺</span><span className="bc-wordmark">Base<span>camp</span></span></div>
            <div className="bc-srow">
              <input className="bc-si" placeholder="Search anything..." value={searchInput} onChange={e => setSearchInput(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSearch()} />
              <button className="bc-sb" onClick={handleSearch}>🔍 Search</button>
            </div>
            <button className="bc-shuffle" onClick={() => loadFeed(apiKey)}>🔀 New Mission</button>
            <button className="bc-rb" onClick={() => { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(ID_CACHE_KEY); window.location.reload(); }} title="Change API key">⚙️</button>
          </div>
          <div className="bc-body">
            {error && <div className="bc-err">⚠️ {error}</div>}
            <div className="bc-pill"><span className="bc-dot" />20 channels · New missions daily</div>
            <div className="bc-h2">{searchLabel ? <>RESULTS FOR <em>"{searchLabel}"</em></> : <>TODAY'S <em>MISSION</em></>}</div>
            {loading ? (
              <div className="bc-loading"><div className="bc-spin" /><div className="bc-lt">Loading the mission…</div></div>
            ) : videos.length === 0 ? (
              <div className="bc-empty">
                  {searchLabel ? (
                    <>
                      <div className="bc-ei">🔭</div>
                      <div className="bc-empty-txt">Nothing found</div>
                      <button className="bc-bigbtn" onClick={() => { setSearchInput(""); setSearchLabel(""); loadFeed(apiKey); }}>Try something else</button>
                    </>
                  ) : (
                    <>
                      <div className="bc-ei">⛺</div>
                      <div className="bc-empty-txt">What are we watching today?</div>
                      <button className="bc-bigbtn" onClick={() => loadFeed(apiKey)}>Find me something awesome</button>
                    </>
                  )}
                </div>
            ) : (
              <div className="bc-grid">{videos.map(v => <VCard key={v.id.videoId} v={v} onPlay={setPlaying} />)}</div>
            )}
          </div>
          {playing && (
            <Player
              video={playing}
              onClose={() => setPlaying(null)}
              onNext={() => loadFeed(apiKey)}
              onBackToFeed={() => setPlaying(null)}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
