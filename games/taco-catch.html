
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Taco Catch!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #1a0a00;
      font-family: 'Segoe UI', sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      user-select: none; touch-action: none;
    }

    #game-wrap {
      position: relative;
      width: 360px; height: 560px;
      background: linear-gradient(180deg, #0d0500 0%, #2d1200 40%, #1a0800 100%);
      border-radius: 24px;
      overflow: hidden;
      border: 2px solid rgba(255,180,0,.2);
      box-shadow: 0 0 60px rgba(255,120,0,.15);
    }

    /* Stars background */
    #game-wrap::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 15%, rgba(255,220,100,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 25%, rgba(255,200,80,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,240,120,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 35%, rgba(255,200,80,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 45%, rgba(255,220,100,.4) 0%, transparent 100%);
      pointer-events: none;
    }

    #hud {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px;
      background: rgba(0,0,0,.4);
      backdrop-filter: blur(4px);
      z-index: 10;
    }
    .hud-score {
      font-size: 22px; font-weight: 900;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255,200,0,.5);
    }
    .hud-label { font-size: 10px; font-weight: 700; color: rgba(255,200,0,.5); text-transform: uppercase; letter-spacing: .08em; }
    .hud-lives { font-size: 20px; letter-spacing: 3px; }

    #canvas { display: block; }

    /* SCREENS */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 30px; text-align: center;
      background: rgba(10,4,0,.88);
      backdrop-filter: blur(6px);
      z-index: 20;
    }
    .screen.hidden { display: none; }
    .screen-emoji { font-size: 64px; animation: bob 2s ease-in-out infinite; }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .screen-title {
      font-size: 34px; font-weight: 900;
      color: #ffd700;
      text-shadow: 0 2px 12px rgba(255,180,0,.6);
      line-height: 1.1;
    }
    .screen-sub { font-size: 14px; color: rgba(255,200,100,.7); line-height: 1.6; }
    .screen-score { font-size: 48px; font-weight: 900; color: #ff8c00; }
    .play-btn {
      background: linear-gradient(135deg, #ff8c00, #ff5500);
      color: #fff; border: none; border-radius: 50px;
      padding: 14px 40px; font-size: 18px; font-weight: 900;
      cursor: pointer; margin-top: 6px;
      box-shadow: 0 4px 20px rgba(255,100,0,.4);
      transition: transform .15s, box-shadow .15s;
      font-family: inherit;
    }
    .play-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(255,100,0,.55); }
    .play-btn:active { transform: scale(.97); }
    .high-score { font-size: 13px; color: rgba(255,200,100,.5); }
  </style>
</head>
<body>
<div id="game-wrap">
  <div id="hud">
    <div>
      <div class="hud-label">Score</div>
      <div class="hud-score" id="score-display">0</div>
    </div>
    <div style="text-align:center">
      <div class="hud-label">Level</div>
      <div class="hud-score" id="level-display">1</div>
    </div>
    <div style="text-align:right">
      <div class="hud-label">Lives</div>
      <div class="hud-lives" id="lives-display">❤️❤️❤️</div>
    </div>
  </div>

  <canvas id="canvas" width="360" height="560"></canvas>

  <!-- START SCREEN -->
  <div class="screen" id="start-screen">
    <div class="screen-emoji">🌮</div>
    <div class="screen-title">TACO<br>CATCH!</div>
    <div class="screen-sub">Catch the falling tacos!<br>Dodge the 💀 skulls!</div>
    <button class="play-btn" id="start-btn">▶ Let's Go!</button>
    <div class="high-score" id="start-high">Best: 0</div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div class="screen hidden" id="over-screen">
    <div class="screen-emoji">😵</div>
    <div class="screen-title">Game Over!</div>
    <div class="screen-score" id="final-score">0</div>
    <div class="screen-sub" id="over-msg">Better luck next time!</div>
    <button class="play-btn" id="retry-btn">🔄 Try Again</button>
    <div class="high-score" id="over-high">Best: 0</div>
  </div>
</div>

<script>
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const W = 360, H = 560;
  const TRAY_Y = H - 70;
  const TRAY_W = 90;
  const TRAY_H = 18;
  const HIGH_KEY = "taco_high";

  let score, lives, level, items, trayX, gameRunning, animId, frameCount;
  let highScore = parseInt(localStorage.getItem(HIGH_KEY) || "0");

  // Update high score displays
  document.getElementById("start-high").textContent = "Best: " + highScore;
  document.getElementById("over-high").textContent  = "Best: " + highScore;

  // ── ITEM TYPES ──────────────────────────────────────────────────────────
  const GOOD = ["🌮","🌮","🌮","🌮","🌮","🌯","🫔","🧀","🥑","🍅","🌶️","🧅"];
  const BAD  = ["💀","💀","🪲","🤢"];

  function randItem() {
    const isBad = Math.random() < (0.2 + level * 0.02);
    const emoji = isBad
      ? BAD[Math.floor(Math.random() * BAD.length)]
      : GOOD[Math.floor(Math.random() * GOOD.length)];
    return {
      x: 20 + Math.random() * (W - 40),
      y: -30,
      emoji,
      bad: isBad,
      speed: 1.5 + Math.random() * 1.5 + level * 0.3,
      size: 28 + Math.floor(Math.random() * 8),
      rotation: (Math.random() - 0.5) * 0.4,
      rot: 0,
      wobble: Math.random() * Math.PI * 2,
    };
  }

  // ── DRAW ────────────────────────────────────────────────────────────────
  function drawTray() {
    // Shadow
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,.3)";
    ctx.beginPath();
    ctx.ellipse(trayX + TRAY_W/2, TRAY_Y + TRAY_H + 6, TRAY_W/2, 8, 0, 0, Math.PI*2);
    ctx.fill();

    // Tray body
    const grad = ctx.createLinearGradient(trayX, TRAY_Y, trayX, TRAY_Y + TRAY_H);
    grad.addColorStop(0, "#c8860a");
    grad.addColorStop(1, "#7a4f00");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(trayX, TRAY_Y, TRAY_W, TRAY_H, 9);
    ctx.fill();

    // Shine
    ctx.fillStyle = "rgba(255,200,80,.25)";
    ctx.beginPath();
    ctx.roundRect(trayX + 6, TRAY_Y + 3, TRAY_W - 12, 5, 3);
    ctx.fill();
    ctx.restore();
  }

  function drawItem(item) {
    ctx.save();
    ctx.translate(item.x, item.y);
    ctx.rotate(item.rot);
    ctx.font = item.size + "px serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    // Glow for tacos
    if (!item.bad) {
      ctx.shadowColor = "rgba(255,180,0,.4)";
      ctx.shadowBlur = 12;
    }
    ctx.fillText(item.emoji, 0, 0);
    ctx.restore();
  }

  function drawBackground() {
    // Subtle ground
    const grd = ctx.createLinearGradient(0, TRAY_Y + TRAY_H, 0, H);
    grd.addColorStop(0, "rgba(80,30,0,.3)");
    grd.addColorStop(1, "rgba(20,8,0,.5)");
    ctx.fillStyle = grd;
    ctx.fillRect(0, TRAY_Y + TRAY_H, W, H - TRAY_Y - TRAY_H);
  }

  // ── PARTICLES ───────────────────────────────────────────────────────────
  let particles = [];
  function spawnParticles(x, y, good) {
    for (let i = 0; i < 8; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 5,
        vy: -2 - Math.random() * 4,
        life: 1,
        emoji: good ? ["✨","⭐","💫"][Math.floor(Math.random()*3)] : ["💥","❌"][Math.floor(Math.random()*2)],
        size: 14 + Math.floor(Math.random() * 8),
      });
    }
  }

  function updateParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.04;
      ctx.globalAlpha = p.life;
      ctx.font = p.size + "px serif";
      ctx.textAlign = "center";
      ctx.fillText(p.emoji, p.x, p.y);
      ctx.globalAlpha = 1;
    });
  }

  // ── GAME LOOP ───────────────────────────────────────────────────────────
  function update() {
    frameCount++;

    // Spawn items
    const spawnRate = Math.max(40 - level * 3, 18);
    if (frameCount % spawnRate === 0) items.push(randItem());

    // Move items
    items = items.filter(item => {
      item.y += item.speed;
      item.rot += item.rotation;
      item.wobble += 0.05;
      item.x += Math.sin(item.wobble) * 0.3;

      // Catch check
      const catchLeft  = item.x - item.size/2;
      const catchRight = item.x + item.size/2;
      const catchY = item.y + item.size/2;

      if (catchY >= TRAY_Y && catchY <= TRAY_Y + TRAY_H + 10 &&
          catchRight >= trayX && catchLeft <= trayX + TRAY_W) {
        if (item.bad) {
          lives--;
          updateHUD();
          spawnParticles(item.x, item.y, false);
          if (lives <= 0) { endGame(); return false; }
        } else {
          score += 10 * level;
          updateHUD();
          spawnParticles(item.x, item.y, true);
          // Level up every 100 points
          const newLevel = Math.floor(score / 100) + 1;
          if (newLevel > level) { level = newLevel; updateHUD(); }
        }
        return false;
      }

      // Missed good item
      if (item.y > H + 10) {
        if (!item.bad) {
          lives--;
          updateHUD();
          if (lives <= 0) { endGame(); return false; }
        }
        return false;
      }
      return true;
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    items.forEach(drawItem);
    drawTray();
    updateParticles();
  }

  function loop() {
    if (!gameRunning) return;
    update();
    draw();
    animId = requestAnimationFrame(loop);
  }

  function updateHUD() {
    document.getElementById("score-display").textContent = score;
    document.getElementById("level-display").textContent = level;
    const hearts = ["","❤️","❤️❤️","❤️❤️❤️"];
    document.getElementById("lives-display").textContent = hearts[Math.max(0, lives)] || "💔";
  }

  function startGame() {
    score = 0; lives = 3; level = 1; items = []; particles = []; frameCount = 0;
    trayX = W/2 - TRAY_W/2;
    gameRunning = true;
    document.getElementById("start-screen").classList.add("hidden");
    document.getElementById("over-screen").classList.add("hidden");
    updateHUD();
    loop();
  }

  function endGame() {
    gameRunning = false;
    cancelAnimationFrame(animId);
    if (score > highScore) {
      highScore = score;
      localStorage.setItem(HIGH_KEY, highScore);
    }
    document.getElementById("final-score").textContent = score + " pts";
    const msgs = ["So close! 🌮", "Keep practicing! 💪", "Taco master in training! 🌟", "Impressive! 🔥"];
    document.getElementById("over-msg").textContent = score > 200 ? "You're a taco legend! 🏆" : msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById("over-high").textContent = "Best: " + highScore;
    document.getElementById("over-screen").classList.remove("hidden");
  }

  // ── CONTROLS ────────────────────────────────────────────────────────────
  // Mouse
  canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    trayX = (e.clientX - rect.left) - TRAY_W/2;
    trayX = Math.max(0, Math.min(W - TRAY_W, trayX));
  });

  // Touch
  canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    trayX = (e.touches[0].clientX - rect.left) * scaleX - TRAY_W/2;
    trayX = Math.max(0, Math.min(W - TRAY_W, trayX));
  }, { passive: false });

  // Keyboard
  let keys = {};
  document.addEventListener("keydown", e => keys[e.key] = true);
  document.addEventListener("keyup",   e => keys[e.key] = false);
  setInterval(() => {
    if (!gameRunning) return;
    if (keys["ArrowLeft"]  || keys["a"]) trayX = Math.max(0, trayX - 8);
    if (keys["ArrowRight"] || keys["d"]) trayX = Math.min(W - TRAY_W, trayX + 8);
  }, 16);

  document.getElementById("start-btn").addEventListener("click", startGame);
  document.getElementById("retry-btn").addEventListener("click", startGame);
</script>
</body>
</html>
