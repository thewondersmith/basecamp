
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Word Quest</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #0a0e1a;
      color: #fff;
      display: flex; flex-direction: column; align-items: center;
      user-select: none;
    }

    /* HEADER */
    #header {
      width: 100%; max-width: 420px;
      padding: 14px 16px 10px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    #title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: .1em;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #streak {
      font-size: 13px; font-weight: 800; color: #fbbf24;
    }
    #new-word-btn {
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
      color: #fff; border-radius: 8px; padding: 6px 12px;
      font-size: 12px; font-weight: 800; font-family: 'Nunito', sans-serif;
      cursor: pointer;
    }
    #new-word-btn:hover { background: rgba(255,255,255,.14); }

    /* BOARD */
    #board-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; padding: 12px 0 8px;
    }
    .row {
      display: flex; gap: 6px;
    }
    .tile {
      width: 54px; height: 54px;
      border: 2px solid rgba(255,255,255,.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 900;
      text-transform: uppercase;
      transition: border-color .1s, transform .1s;
      position: relative;
    }
    .tile.filled { border-color: rgba(255,255,255,.4); transform: scale(1.05); }
    .tile.correct { background: #16a34a; border-color: #16a34a; animation: flip .4s ease forwards; }
    .tile.present { background: #ca8a04; border-color: #ca8a04; animation: flip .4s ease forwards; }
    .tile.absent  { background: #374151; border-color: #374151; animation: flip .4s ease forwards; }
    .tile.shake   { animation: shake .4s ease; }

    @keyframes flip {
      0%   { transform: rotateX(0); }
      50%  { transform: rotateX(90deg); }
      100% { transform: rotateX(0); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-12px); }
    }
    .tile.win-bounce { animation: bounce .4s ease forwards; }

    /* TOAST */
    #toast {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,.95); color: #0a0e1a;
      padding: 10px 20px; border-radius: 50px;
      font-size: 14px; font-weight: 900;
      opacity: 0; transition: opacity .2s;
      z-index: 100; white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* KEYBOARD */
    #keyboard {
      width: 100%; max-width: 420px;
      padding: 0 8px 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .kb-row { display: flex; gap: 5px; justify-content: center; }
    .key {
      height: 52px; min-width: 34px; padding: 0 4px;
      border-radius: 8px; border: none;
      background: #1e2d40; color: #fff;
      font-size: 13px; font-weight: 900;
      font-family: 'Nunito', sans-serif;
      cursor: pointer; flex: 1; max-width: 38px;
      transition: background .2s, transform .1s;
      text-transform: uppercase;
    }
    .key.wide { max-width: 56px; font-size: 11px; }
    .key:active { transform: scale(.93); }
    .key.correct { background: #16a34a; }
    .key.present { background: #ca8a04; }
    .key.absent  { background: #111827; color: #4b5563; }

    /* END SCREEN */
    #end-screen {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(10,14,26,.92); backdrop-filter: blur(8px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 30px; text-align: center;
    }
    #end-screen.hidden { display: none; }
    .end-icon { font-size: 64px; animation: bounce .6s ease infinite; }
    .end-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px; letter-spacing: .06em;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .end-word {
      font-size: 36px; font-weight: 900; color: #fbbf24;
      letter-spacing: .1em; text-transform: uppercase;
    }
    .end-sub { font-size: 14px; color: rgba(255,255,255,.5); }
    .end-stat { font-size: 18px; font-weight: 900; color: #fff; }
    .end-btn {
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      color: #0a0e1a; border: none; border-radius: 50px;
      padding: 14px 36px; font-size: 17px; font-weight: 900;
      font-family: 'Nunito', sans-serif; cursor: pointer;
      box-shadow: 0 4px 20px rgba(96,165,250,.3);
      margin-top: 6px;
    }
    .end-btn:hover { opacity: .9; }

    /* DIFFICULTY */
    #difficulty {
      display: flex; gap: 8px; padding: 6px 0 0;
    }
    .diff-btn {
      background: rgba(255,255,255,.08); border: 1.5px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.6); border-radius: 50px;
      padding: 5px 14px; font-size: 12px; font-weight: 800;
      font-family: 'Nunito', sans-serif; cursor: pointer;
    }
    .diff-btn.active { background: rgba(96,165,250,.2); border-color: #60a5fa; color: #60a5fa; }
  </style>
</head>
<body>

<div id="header">
  <div id="title">⚔️ Word Quest</div>
  <button id="new-word-btn">🔀 New</button>
  <div id="difficulty">
    <button class="diff-btn active" data-len="4">4</button>
    <button class="diff-btn" data-len="5">5</button>
    <button class="diff-btn" data-len="6">6</button>
  </div>
  <div id="streak">🔥 <span id="streak-count">0</span></div>
</div>

<div id="board-wrap" id="board"></div>

<div id="keyboard">

</div>

</div>

EPY","SLIGHT","SLOWLY","SMOOTH","SNATCH","SNUGLY","SPIDER","SPIRAL","SPLASH","SPRING","SPROUT","STABLE","STARVE","STEADY","STICKY","STREAM","STRICT","STRIKE","STRING","STRONG","STRUCK","SUMMER","SUNKEN","SUNSET","SWITCH","TAVERN","TEMPLE","TENDER","TERROR","THATCH","THORNY","TICKLE","TIMBER","TINKER","TONGUE","TOUCHY","TREBLE","TRIPLE","TROPHY","TUMBLE","TWELVE","UNISON","UNLESS","UNLIKE","UNVEIL","UPDATE","UPWARD","VACUUM","VANISH","VANITY","VELVET","VERIFY","VERSUS","VICTIM","VISION","VIVIFY","VULCAN","WANDER","WASTED","BATTLE","WINTER","WISDOM","WONDER","WORTHY","WREATH","YELLOW","ZEPHYR"]
};

const KEYBOARD_ROWS = [
  ["Q","W","E","R","T","Y","U","I","O","P"],
  ["A","S","D","F","G","H","J","K","L"],
  ["ENTER","Z","X","C","V","B","N","M","⌫"]
];

// ── STATE ─────────────────────────────────────────────────────────────────
let wordLen = 4;
let maxGuesses = 6;
let target = "";
let guesses = [];
let current = "";
let gameOver = false;
let streak = parseInt(localStorage.getItem("wq_streak") || "0");
let keyStates = {};

function pickWord() {
  const list = WORDS[wordLen];
  return list[Math.floor(Math.random() * list.length)];
}

function initGame() {
  target = pickWord();
  guesses = [];
  current = "";
  gameOver = false;
  keyStates = {};
  document.getElementById("end-screen").classList.add("hidden");
  buildBoard();
  buildKeyboard();
  updateStreak();
}

// ── BOARD ─────────────────────────────────────────────────────────────────
function buildBoard() {
  const wrap = document.getElementById("board-wrap");
  wrap.innerHTML = "";
  for (let r = 0; r < maxGuesses; r++) {
    const row = document.createElement("div");
    row.className = "row";
    row.id = "row-" + r;
    for (let c = 0; c < wordLen; c++) {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.id = `tile-${r}-${c}`;
      row.appendChild(tile);
    }
    wrap.appendChild(row);
  }
}

function updateCurrentRow() {
  const r = guesses.length;
  for (let c = 0; c < wordLen; c++) {
    const tile = document.getElementById(`tile-${r}-${c}`);
    tile.textContent = current[c] || "";
    tile.className = "tile" + (current[c] ? " filled" : "");
  }
}

function revealGuess(guess, rowIdx) {
  const result = scoreGuess(guess);
  // Count delay per tile
  for (let c = 0; c < wordLen; c++) {
    const tile = document.getElementById(`tile-${rowIdx}-${c}`);
    setTimeout(() => {
      tile.textContent = guess[c];
      tile.className = "tile " + result[c];
    }, c * 180);
  }
  // Update key states after reveal
  setTimeout(() => {
    for (let c = 0; c < wordLen; c++) {
      const letter = guess[c];
      const state = result[c];
      const priority = { correct: 3, present: 2, absent: 1 };
      if ((priority[state] || 0) > (priority[keyStates[letter]] || 0)) {
        keyStates[letter] = state;
      }
    }
    updateKeyboard();
    // Check win/lose
    if (guess === target) {
      streak++;
      localStorage.setItem("wq_streak", streak);
      updateStreak();
      setTimeout(() => showWin(rowIdx + 1), 300);
    } else if (guesses.length >= maxGuesses) {
      setTimeout(showLose, 300);
    }
  }, wordLen * 180 + 100);
}

function scoreGuess(guess) {
  const result = Array(wordLen).fill("absent");
  const targetArr = target.split("");
  const guessArr  = guess.split("");
  // First pass: correct
  for (let i = 0; i < wordLen; i++) {
    if (guessArr[i] === targetArr[i]) {
      result[i] = "correct";
      targetArr[i] = null;
      guessArr[i] = null;
    }
  }
  // Second pass: present
  for (let i = 0; i < wordLen; i++) {
    if (guessArr[i] === null) continue;
    const j = targetArr.indexOf(guessArr[i]);
    if (j !== -1) {
      result[i] = "present";
      targetArr[j] = null;
    }
  }
  return result;
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────
function buildKeyboard() {
  KEYBOARD_ROWS.forEach((keys, ri) => {
    const row = document.getElementById("kb-row-" + ri);
    row.innerHTML = "";
    keys.forEach(k => {
      const btn = document.createElement("button");
      btn.className = "key" + (k.length > 1 ? " wide" : "");
      btn.textContent = k;
      btn.dataset.key = k;
      btn.addEventListener("click", () => handleKey(k));
      row.appendChild(btn);
    });
  });
}

function updateKeyboard() {
  document.querySelectorAll(".key").forEach(btn => {
    const k = btn.dataset.key;
    if (keyStates[k]) btn.className = "key" + (k.length > 1 ? " wide" : "") + " " + keyStates[k];
  });
}

// ── INPUT ─────────────────────────────────────────────────────────────────
function handleKey(key) {
  if (gameOver) return;
  if (key === "⌫" || key === "BACKSPACE") {
    current = current.slice(0, -1);
    updateCurrentRow();
  } else if (key === "ENTER") {
    submitGuess();
  } else if (/^[A-Z]$/.test(key) && current.length < wordLen) {
    current += key;
    updateCurrentRow();
  }
}

function submitGuess() {
  if (current.length < wordLen) { shakeRow(guesses.length); toast("Not enough letters"); return; }
  // Check if valid word (lenient — accept any input)
  const guess = current;
  guesses.push(guess);
  const rowIdx = guesses.length - 1;
  current = "";
  revealGuess(guess, rowIdx);
  gameOver = (guess === target || guesses.length >= maxGuesses);
}

function shakeRow(rowIdx) {
  const row = document.getElementById("row-" + rowIdx);
  row.querySelectorAll(".tile").forEach(t => {
    t.classList.remove("shake");
    void t.offsetWidth;
    t.classList.add("shake");
  });
}

// ── END SCREENS ────────────────────────────────────────────────────────────
function showWin(guessCount) {
  const msgs = ["Genius! 🧠","Magnificent! 🌟","Impressive! 💪","Splendid! ✨","Great! 👏","Phew! 😅"];
  const msg = msgs[Math.min(guessCount - 1, msgs.length - 1)];
  document.getElementById("end-icon").textContent = "🎉";
  document.getElementById("end-title").textContent = msg;
  document.getElementById("end-word").textContent = target;
  document.getElementById("end-sub").textContent = `Solved in ${guessCount} guess${guessCount===1?"":"es"}`;
  document.getElementById("end-stat").textContent = `🔥 Streak: ${streak}`;
  document.getElementById("end-screen").classList.remove("hidden");
  // Bounce winning row
  for (let c = 0; c < wordLen; c++) {
    setTimeout(() => {
      const tile = document.getElementById(`tile-${guessCount-1}-${c}`);
      tile.classList.add("win-bounce");
    }, c * 100);
  }
}

function showLose() {
  document.getElementById("end-icon").textContent = "😞";
  document.getElementById("end-title").textContent = "So close!";
  document.getElementById("end-word").textContent = target;
  document.getElementById("end-sub").textContent = "That was the word!";
  document.getElementById("end-stat").textContent = `Streak reset to 0`;
  streak = 0;
  localStorage.setItem("wq_streak", 0);
  updateStreak();
  document.getElementById("end-screen").classList.remove("hidden");
}

// ── TOAST ─────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 1400);
}

// ── DIFFICULTY ────────────────────────────────────────────────────────────
document.querySelectorAll(".diff-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".diff-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    wordLen = parseInt(btn.dataset.len);
    initGame();
  });
});

// ── STREAK ────────────────────────────────────────────────────────────────
function updateStreak() {
  document.getElementById("streak-count").textContent = streak;
}

// ── KEYBOARD EVENTS ───────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.key === "Backspace") handleKey("BACKSPACE");
  else if (e.key === "Enter") handleKey("ENTER");
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

const endBtn = document.getElementById("end-btn");
const newBtn = document.getElementById("new-word-btn");
if (endBtn) endBtn.addEventListener("click", initGame);
if (newBtn) newBtn.addEventListener("click", () => { streak = 0; localStorage.setItem("wq_streak",0); initGame(); });

// ── START ─────────────────────────────────────────────────────────────────
initGame();

</script>
